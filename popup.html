<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAOLI CORS Helper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <h1>TAOLI CORS Helper</h1>
    <label class="row">
      <input id="enabled" type="checkbox" />
      <span>启用扩展代理</span>
    </label>
    <label class="row">
      <input id="autoProxyFetch" type="checkbox" />
      <span>自动代理 fetch 请求</span>
    </label>
    <label class="row">
      <input id="onlyCurrentSite" type="checkbox" />
      <span>仅对当前网站生效</span>
    </label>
    <p class="hint" id="currentSiteHint"></p>

    <section>
      <h2>允许代理的 API 域名</h2>
      <textarea id="targetOrigins" rows="8"></textarea>
      <p class="hint">每行一个 origin，例如：https://api.binance.com</p>
    </section>

    <button id="save">保存并刷新当前页</button>
    <p id="status"></p>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
